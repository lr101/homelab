# dynamic.yml (dynamic configuration)
http:
  routers:
    # home (dashboard)
    home:
      entryPoints: 
        - websecure
      rule: "Host(`home.lr-projects.de`)"
      tls:
        certResolver: cloudflare
      service: home-service

    stick-it-web:
      entryPoints: 
        - websecure
      rule: "Host(`app.lr-projects.de`)"
      tls:
        certResolver: cloudflare
      service: stick-it-web-service
      middlewares:
        - stick-it-web-headers
 
    # minio
    minio:
      entryPoints: websecure
      rule: "Host(`minio.lr-projects.de`) || HostRegexp(`{subdomain:[a-z0-9-]+}.minio.lr-projects.de`)"
      tls:
        certResolver: cloudflare
      service: minio-service
      middlewares:
        - s3-headers


    # nextcloud
    nextcloud:
      entryPoints: websecure
      rule: "Host(`nextcloud.lr-projects.de`)"
      tls:
        certResolver: cloudflare
      service: nextcloud-service
      middlewares:
        - nextcloud-office-headers
        - nextcloud_block_direct_login
        - nextcloud_redirectregex


    office:
      entryPoints: websecure
      rule: "Host(`office.lr-projects.de`)"
      tls:
        certResolver: cloudflare
      service: office-service
      middlewares:
        - nextcloud-office-headers
    
# sso
    sso:
      entryPoints: websecure
      rule: "Host(`sso.lr-projects.de`)"
      tls:
        certResolver: cloudflare
      service: sso-service


    # stick-it
    stickit:
      entryPoints: websecure
      rule: "Host(`stick-it.lr-projects.de`)"
      tls:
        certResolver: cloudflare
      service: stickit-service
      middlewares:
        - secHeaders


    # stick-it-map
    stickit-map:
      entryPoints: websecure
      rule: "Host(`stick-it-map.lr-projects.de`)"
      tls:
        certResolver: cloudflare
      service: stickit-map-service
      middlewares:
        - secHeaders

  
  services:
    home-service:
      loadBalancer:
        servers:
          - url: "https://home.thinkpad.lr-projects.de"
        passHostHeader: false

    stick-it-web-service:
      loadBalancer:
        servers:
          - url: "https://stick-it-web.thinkpad.lr-projects.de"
        passHostHeader: false

    minio-service:
      loadBalancer:
        servers:
          - url: "https://s3.thinkpad.lr-projects.de"
        passHostHeader: true

    nextcloud-service:
      loadBalancer:
        servers:
          - url: "https://nextcloud.medion.lr-projects.de"
        passHostHeader: false

    office-service:
      loadBalancer:
        servers:
          - url: "https://office.medion.lr-projects.de"
        passHostHeader: true

    sso-service:
      loadBalancer:
        servers:
          - url: "https://sso.medion.lr-projects.de"
        passHostHeader: false

    stickit-service:
      loadBalancer:
        servers:
          - url: "https://stick-it.thinkpad.lr-projects.de"
        passHostHeader: false

    stickit-map-service:
      loadBalancer:
        servers:
          - url: "https://stick-it-home.medion.lr-projects.de"
        passHostHeader: false

  middlewares:
    body-50mb:
      buffering:
        maxRequestBodyBytes: 52428800 # 50 MB

    nextcloud_redirectregex:
      redirectRegex:
        regex: "https://(.*)/.well-known/(?:card|cal)dav"
        replacement: "https://$1/remote.php/dav"
        permanent: true

    # Matches the login URL far all query params and redirects to /login to always use SSO login
    nextcloud_block_direct_login:
      redirectRegex:
        regex: "^https://(.*)/login\\?(.*)$*"
        replacement: "https://$1/login"
        permanent: true

    nextcloud-office-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        referrerPolicy: "no-referrer-when-downgrade"
        frameDeny: false
        customFrameOptionsValue: ""
        contentSecurityPolicy: "frame-ancestors 'self' https://nextcloud.lr-projects.de https://office.lr-projects.de"
        customResponseHeaders:
          X-Frame-Options: "sameorigin"
          x-powered-by: ""
          server: ""

    stick-it-web-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        referrerPolicy: "no-referrer-when-downgrade"
        frameDeny: false
        customFrameOptionsValue: ""
        contentSecurityPolicy: "frame-ancestors 'self' https://app.lr-projects.de https://stick-it.lr-projects.de https://minio.lr-projects.de"
        customResponseHeaders:
          X-Frame-Options: "sameorigin"
          x-powered-by: ""
          server: ""


    s3-headers:
      headers:
        customResponseHeaders:
          Access-Control-Allow-Origin: "*"
