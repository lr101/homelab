http:
  middlewares:
    oidc-auth:
      plugin:
        traefik-oidc-auth:
          Secret: ${SECRET_SALT}
          Provider:
            Url: "https://sso.lr-projects.de"
            ClientId: ${CLIENT_ID}
            ClientSecret: ${CLIENT_SECRET}
          Scopes: ["openid", "profile", "email"]

    allow-vpn-ips:
      ipAllowList:
        sourceRange:
          - "127.0.0.1/32"
          - "10.217.236.0/24"

    secHeaders:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        referrerPolicy: "no-referrer-when-downgrade"
        stsIncludeSubdomains: true
        frameDeny: false
        customFrameOptionsValue: ""
        stsPreload: true
        stsSeconds: 31536000
        permissionsPolicy: >
          autoplay=(self), camera=(self),
          clipboard-read=(self), clipboard-write=(self),
          display-capture=(self), encrypted-media=(self),
          fullscreen=(self), geolocation=(self),
          microphone=(self), midi=(),
          payment=(), picture-in-picture=(self),
          publickey-credentials-get=(self)
        contentSecurityPolicy: "default-src 'self'; script-src 'self'; object-src 'none';"
        customResponseHeaders:
          server: ""
          x-powered-by: ""
          x-frame-options: ""

    crowdsec:
      plugin:
        bouncer:
          crowdsecMode: live
          enabled: true
          crowdsecAppsecEnabled: true
          crowdsecAppsecHost: "crowdsec:7422"
          crowdsecAppsecPath: "/"
          crowdsecAppsecFailureBlock: true
          crowdsecAppsecUnreachableBlock: true
          crowdsecAppsecBodyLimit: 10485760
          crowdsecLapiKey: {{ env "CROWDSEC_BOUNCER_API_KEY" }}
          crowdseclapischeme: http
          crowdseclapihost: "crowdsec:8080"
          crowdsecLapiTLSInsecureVerify: true
          clientTrustedIPs:
            - 10.217.236.0/24          

