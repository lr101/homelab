services:
  stick-it-server:
    image: ghcr.io/lr101/stick-it-server-go:snapshot
    container_name: stick-it-server
    restart: unless-stopped
    volumes:
    - ./firebase-token.json:/app/firebase-token.json
    env_file:
    - ./.env
    networks:
    - frontend
    labels:
    - traefik.enable=true
    - traefik.http.routers.stick-it.rule=Host(`stick-it.thinkpad.lr-projects.de`)
    - traefik.http.routers.stick-it.entrypoints=websecure
    - traefik.http.routers.stick-it.tls=true
    - traefik.http.routers.stick-it.tls.certresolver=cloudflare
    - traefik.http.services.stick-it.loadbalancer.server.port=8080
    - traefik.docker.network=frontend
    annotations:
    - de.lr-projects.description=Stick It backend
    - de.lr-projects.sso=false
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    volumes:
      - ./minio:/data  # Altes MinIO-Verzeichnis mounten
    networks:
    - frontend
    env_file: .env
    labels:
    - traefik.enable=true
    - "traefik.http.routers.rustfs.rule=Host(`minio.lr-projects.de`) || HostRegexp(`{bucket:.+}.minio.lr-projects.de`) || Host(`s3.thinkpad.lr-projects.de`)"
    - traefik.http.routers.rustfs.entrypoints=websecure
    - traefik.http.routers.rustfs.tls=true
    - traefik.http.routers.rustfs.tls.certresolver=cloudflare
    - traefik.http.services.rustfs-srv.loadbalancer.server.port=9000
    - traefik.http.routers.rustfs.service=rustfs-srv
    - traefik.http.routers.rustfs-admin.rule=Host(`s3-admin.thinkpad.lr-projects.de`)
    - traefik.http.routers.rustfs-admin.entrypoints=websecure
    - traefik.http.routers.rustfs-admin.tls=true
    - traefik.http.routers.rustfs-admin.tls.certresolver=cloudflare
    - traefik.http.services.rustfs-admin-srv.loadbalancer.server.port=9001
    - traefik.http.routers.rustfs-admin.service=rustfs-admin-srv
    - traefik.docker.network=frontend
    environment:
    - RUSTFS_ACCESS_KEY=${MINIO_ACCESS_KEY}
    - RUSTFS_SECRET_KEY=${MINIO_SECRET_KEY}
    - RUSTFS_SERVER_DOMAINS=${MINIO_ENDPOINT}
    command: server /data --address ":9000" --console-address ":9001"
    restart: always


  stick-it-web:
    image: ghcr.io/lr101/stick-it:main
    container_name: stick-it-web
    restart: unless-stopped
    networks:
    - frontend
    labels:
    - traefik.enable=true
    - traefik.http.routers.stick-it-web.rule=Host(`stick-it-web.thinkpad.lr-projects.de`)
    - traefik.http.routers.stick-it-web.entrypoints=websecure
    - traefik.http.routers.stick-it-web.tls=true
    - traefik.http.routers.stick-it-web.tls.certresolver=cloudflare
    - traefik.http.services.stick-it-web.loadbalancer.server.port=80
    - traefik.docker.network=frontend
    annotations:
    - de.lr-projects.description=Stick It Web app
    - de.lr-projects.sso=false
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 200M
        reservations:
          cpus: '0.1'
          memory: 100M

  
networks:
  frontend:
    external: true
