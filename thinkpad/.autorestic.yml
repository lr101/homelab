version: 2

backends:
  nas:
    type: sftp
    path: nas:/backup_thinkpad
  local:
    type: local
    path: /backup


global:
  forget:
    keep-last: 5
    keep-daily: 7
    keep-weekly: 4
    keep-monthly: 12
    keep-yearly: 7


monitors:
  stats:
    type: influx


locations:
  docker-tags:
    from:
    - ./.backup
    to:
    - local
    - nas
    monitors:
    - stats
    forget: prune
    hooks:
      before: /hooks/docker-tags-hook.sh
  
  glance:
    from:
    - ./glance
    to:
    - local
    - nas
    forget: prune
    monitors:
    - stats
  
  ha:
    from:
    - ./ha
    to:
    - local
    - nas
    monitors:
    - stats
    forget: prune
    hooks:
      before:
      - python3 /hooks/mariadb-hook.py mariadb homeassistant --folder ha
  
  monaserver:
    from:
    - ./monaserver
    to:
    - local
    - nas
    forget: prune
    hooks:
      before:
      - python3 /hooks/postgres-hook.py stick-it-db postgres stickitprod --backup-dir monaserver/.backup
    monitors:
    - stats
  
  postgis:
    from:
    - ./postgis
    to:
    - local
    - nas
    monitors:
    - stats
    forget: prune
    hooks:
      before:
      - python3 /hooks/postgres-hook.py stick-it-db postgres tempserver --backup-dir postgis/.backup
    options:
      backup:
        exclude:
          - '/postgres-data/*'
  
  tempserver:
    from:
    - ./tempserver
    to:
    - local
    - nas
    forget: prune
    monitors:
    - stats
  
  traefik:
    from:
    - ./traefik
    to:
    - local
    - nas
    forget: prune
    monitors:
    - stats
